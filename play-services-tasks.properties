-- Khởi tạo Kavo UI (Rất hợp với Delta)
local Kavo = loadstring(game:HttpGet("https://raw.githubusercontent.com/xHeptc/Kavo-UI-Library/main/source.lua"))()
local Window = Kavo:CreateWindow("nguyen menu", "DarkTheme")

-- TẠO CÁC TAB
local Tab1 = Window:NewTab("Sức Mạnh")
local Section1 = Tab1:NewSection("Tăng Sát Thương")

local Tab2 = Window:NewTab("Aimbot")
local Section2 = Tab2:NewSection("Khóa Mục Tiêu")

local Tab3 = Window:NewTab("Hitbox")
local Section3 = Tab3:NewSection("Bật Hitbox")

local Tab4 = Window:NewTab("Tốc Độ & Nhảy")
local Section4 = Tab4:NewSection("Chỉnh Chỉ Số")

-- ================= TAB 1 =================
local DamageValue = 1
Section1:NewSlider("Tăng Dame", "Chỉnh mức dame cộng thêm", 50, 1, function(v)
    DamageValue = v
end)

-- ================= TAB 2 =================
local AimbotEnabled = false
local Camera = game:GetService("Workspace").CurrentCamera
local LocalPlayer = game:GetService("Players").LocalPlayer

Section2:NewToggle("Bật Aimbot Head", "Tự động khóa tâm vào đầu", function(state)
    AimbotEnabled = state
end)

local function GetClosestPlayer()
    local ClosestPlayer = nil
    local ShortestDistance = math.huge
    for _, Player in pairs(game:GetService("Players"):GetPlayers()) do
        if Player ~= LocalPlayer and Player.Character and Player.Character:FindFirstChild("Head") and Player.Character:FindFirstChildOfClass("Humanoid") and Player.Character.Humanoid.Health > 0 then
            local Pos, OnScreen = Camera:WorldToViewportPoint(Player.Character.Head.Position)
            if OnScreen then
                local MousePos = game:GetService("UserInputService"):GetMouseLocation()
                local Distance = (Vector2.new(Pos.X, Pos.Y) - MousePos).Magnitude
                if Distance < ShortestDistance then
                    ClosestPlayer = Player
                    ShortestDistance = Distance
                end
            end
        end
    end
    return ClosestPlayer
end

game:GetService("RunService").RenderStepped:Connect(function()
    if AimbotEnabled then
        local Target = GetClosestPlayer()
        if Target and Target.Character and Target.Character:FindFirstChild("Head") then
            Camera.CFrame = CFrame.new(Camera.CFrame.Position, Target.Character.Head.Position)
        end
    end
end)

-- ================= TAB 3 =================
local HitboxSize = 1
local HitboxEnabled = false

Section3:NewToggle("Bật Hitbox Đánh Xa", "Bật tắt hitbox", function(state)
    HitboxEnabled = state
end)

Section3:NewSlider("Kích Thước Hitbox", "Tầm đánh (1 - 40)", 40, 1, function(v)
    HitboxSize = v
end)

task.spawn(function()
    while task.wait(0.5) do
        if HitboxEnabled then
            for _, Player in pairs(game:GetService("Players"):GetPlayers()) do
                if Player ~= LocalPlayer and Player.Character and Player.Character:FindFirstChild("HumanoidRootPart") then
                    local HRP = Player.Character.HumanoidRootPart
                    HRP.Size = Vector3.new(HitboxSize, HitboxSize, HitboxSize)
                    HRP.Transparency = 0.7
                    HRP.BrickColor = BrickColor.new("Really red")
                    HRP.CanCollide = false
                end
            end
        else
            for _, Player in pairs(game:GetService("Players"):GetPlayers()) do
                if Player ~= LocalPlayer and Player.Character and Player.Character:FindFirstChild("HumanoidRootPart") then
                    local HRP = Player.Character.HumanoidRootPart
                    HRP.Size = Vector3.new(2, 2, 1)
                    HRP.Transparency = 1
                    HRP.CanCollide = true
                end
            end
        end
    end
end)

-- ================= TAB 4 =================
local NormalSpeed = 16
local NormalJump = 50
local InfiniteJumpEnabled = false

Section4:NewSlider("Tốc Độ", "Mặc định là 16", 150, 16, function(v)
    NormalSpeed = v
end)

Section4:NewSlider("Nhảy Cao", "Mặc định là 50", 300, 50, function(v)
    NormalJump = v
end)

Section4:NewToggle("Nhảy Liên Tục", "Infinite Jump", function(state)
    InfiniteJumpEnabled = state
end)

game:GetService("RunService").Heartbeat:Connect(function()
    if LocalPlayer.Character and LocalPlayer.Character:FindFirstChildOfClass("Humanoid") then
        LocalPlayer.Character.Humanoid.WalkSpeed = NormalSpeed
        local Hum = LocalPlayer.Character.Humanoid
        if Hum.UseJumpPower then Hum.JumpPower = NormalJump else Hum.JumpHeight = NormalJump end
    end
end)

game:GetService("UserInputService").JumpRequest:Connect(function()
    if InfiniteJumpEnabled and LocalPlayer.Character and LocalPlayer.Character:FindFirstChildOfClass("Humanoid") then
        LocalPlayer.Character.Humanoid:ChangeState("Jumping")
    end
end)
