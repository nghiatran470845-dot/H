-- ========================================================
-- NGUYENMENU - BẢN THUẦN KHÔNG DÙNG THƯ VIỆN NGOÀI (CỨU CÁNH DELTA)
-- ========================================================

-- Xóa menu cũ nếu có để tránh trùng lặp
if game.CoreGui:FindFirstChild("nguyenmenu_Goc") then
    game.CoreGui["nguyenmenu_Goc"]:Destroy()
end

-- TẠO GIAO DIỆN GỐC (GUI)
local ScreenGui = Instance.new("ScreenGui")
ScreenGui.Name = "nguyenmenu_Goc"
ScreenGui.Parent = game.CoreGui
ScreenGui.ResetOnSpawn = false

-- KHUNG CHÍNH (MAIN FRAME)
local MainFrame = Instance.new("Frame")
MainFrame.Size = UDim2.new(0, 350, 0, 280)
MainFrame.Position = UDim2.new(0.5, -175, 0.4, -140)
MainFrame.BackgroundColor3 = Color3.fromRGB(25, 25, 25)
MainFrame.BorderSizePixel = 2
MainFrame.BorderColor3 = Color3.fromRGB(255, 0, 128) -- Viền hồng bảy màu
MainFrame.Active = true
MainFrame.Draggable = true -- Có thể giữ kéo di chuyển trên màn hình
MainFrame.Parent = ScreenGui

-- TIÊU ĐỀ MENU
local Title = Instance.new("TextLabel")
Title.Size = UDim2.new(1, 0, 0, 40)
Title.BackgroundColor3 = Color3.fromRGB(35, 35, 35)
Title.Text = "nguyenmenu | KEY SYSTEM"
Title.TextColor3 = Color3.fromRGB(255, 255, 0) -- Chữ vàng
Title.TextSize = 18
Title.Font = Enum.Font.SourceSansBold
Title.Parent = MainFrame

-- ========================================================
-- PHẦN NHẬP CHỮ (TEXTBOX) - BẤM VÀO ĐỂ HIỆN BÀN PHÍM NHẬP KEY
-- ========================================================
local KeyInput = Instance.new("TextBox")
KeyInput.Size = UDim2.new(0, 250, 0, 45)
KeyInput.Position = UDim2.new(0.5, -125, 0.4, -20)
KeyInput.BackgroundColor3 = Color3.fromRGB(45, 45, 45)
KeyInput.TextColor3 = Color3.fromRGB(255, 255, 255)
KeyInput.PlaceholderText = "Bấm vào đây để nhập Key..."
KeyInput.PlaceholderColor3 = Color3.fromRGB(150, 150, 150)
KeyInput.Text = ""
KeyInput.TextSize = 16
KeyInput.Font = Enum.Font.SourceSans
KeyInput.Parent = MainFrame

-- NÚT KIỂM TRA KEY
local CheckBtn = Instance.new("TextButton")
CheckBtn.Size = UDim2.new(0, 150, 0, 40)
CheckBtn.Position = UDim2.new(0.5, -75, 0.7, 0)
CheckBtn.BackgroundColor3 = Color3.fromRGB(0, 170, 100) -- Màu xanh lá
CheckBtn.Text = "Kiểm Tra Key"
CheckBtn.TextColor3 = Color3.fromRGB(255, 255, 255)
CheckBtn.TextSize = 16
CheckBtn.Font = Enum.Font.SourceSansBold
CheckBtn.Parent = MainFrame

-- ========================================================
-- HÀM TẠO 3 TAB CHỨC NĂNG SAU KHI NHẬP ĐÚNG KEY
-- ========================================================
local function MoKhoaMenuChinh()
    -- Xóa giao diện nhập Key cũ đi cho sạch
    KeyInput:Destroy()
    CheckBtn:Destroy()
    Title.Text = "nguyenmenu | by nguyennek_yeah"

    -- Điều chỉnh lại kích thước khung chính rộng ra để chứa 3 Tab
    MainFrame.Size = UDim2.new(0, 450, 0, 320)
    MainFrame.Position = UDim2.new(0.5, -225, 0.4, -160)

    -- KHU VỰC CHỨA CÁC NÚT TAB (Bên trái)
    local TabContainer = Instance.new("Frame")
    TabContainer.Size = UDim2.new(0, 120, 1, -40)
    TabContainer.Position = UDim2.new(0, 0, 0, 40)
    TabContainer.BackgroundColor3 = Color3.fromRGB(30, 30, 30)
    TabContainer.Parent = MainFrame

    -- KHU VỰC CHỨA NỘI DUNG TÍNH NĂNG (Bên phải)
    local ContentContainer = Instance.new("ScrollingFrame")
    ContentContainer.Size = UDim2.new(1, -130, 1, -50)
    ContentContainer.Position = UDim2.new(0, 125, 0, 45)
    ContentContainer.BackgroundColor3 = Color3.fromRGB(20, 20, 20)
    ContentContainer.CanvasSize = UDim2.new(0, 0, 2, 0) -- Cuộn xuống được
    ContentContainer.ScrollBarThickness = 6
    ContentContainer.Parent = MainFrame

    local UIListLayout = Instance.new("UIListLayout")
    UIListLayout.Parent = ContentContainer
    UIListLayout.Padding = UDim.new(0, 5)

    -- Hàm tạo các tính năng dạng Bật/Tắt (Toggle) nhanh gọn
    local function TaoChucNang(TenChucNang)
        local Btn = Instance.new("TextButton")
        Btn.Size = UDim2.new(1, -10, 0, 35)
        Btn.BackgroundColor3 = Color3.fromRGB(40, 40, 40)
        Btn.Text = "  [ TẮT ] " .. TenChucNang
        Btn.TextColor3 = Color3.fromRGB(200, 200, 200)
        Btn.TextXAlignment = Enum.TextXAlignment.Left
        Btn.TextSize = 14
        Btn.Font = Enum.Font.SourceSans
        Btn.Parent = ContentContainer

        local ĐangBat = false
        Btn.MouseButton1Click:Connect(function()
            ĐangBat = not ĐangBat
            if ĐangBat then
                Btn.BackgroundColor3 = Color3.fromRGB(0, 120, 255)
                Btn.Text = "  [ BẬT ] " .. TenChucNang
                Btn.TextColor3 = Color3.fromRGB(255, 255, 255)
            else
                Btn.BackgroundColor3 = Color3.fromRGB(40, 40, 40)
                Btn.Text = "  [ TẮT ] " .. TenChucNang
                Btn.TextColor3 = Color3.fromRGB(200, 200, 200)
            end
        end)
    end

    -- Hàm dọn sạch khu vực nội dung cũ khi chuyển Tab
    local function DonDepNộiDung()
        for _, v in pairs(ContentContainer:GetChildren()) do
            if v:IsA("TextButton") or v:IsA("TextLabel") then v:Destroy() end
        end
    end

    -- TẠO 3 NÚT TAB BÊN TRÁI
    local Tab1 = Instance.new("TextButton")
    Tab1.Size = UDim2.new(1, -10, 0, 40)
    Tab1.Position = UDim2.new(0, 5, 0, 10)
    Tab1.Text = "TAB 1: AUTO"
    Tab1.BackgroundColor3 = Color3.fromRGB(50, 50, 50)
    Tab1.TextColor3 = Color3.fromRGB(255, 255, 255)
    Tab1.Font = Enum.Font.SourceSansBold
    Tab1.Parent = TabContainer

    local Tab2 = Tab1:Clone()
    Tab2.Position = UDim2.new(0, 5, 0, 60)
    Tab2.Text = "TAB 2: RUN"
    Tab2.Parent = TabContainer

    local Tab3 = Tab1:Clone()
    Tab3.Position = UDim2.new(0, 5, 0, 110)
    Tab3.Text = "TAB 3: TIKTOK"
    Tab3.Parent = TabContainer

    -- SỰ KIỆN BẤM VÀO TAB 1 (AUTO)
    Tab1.MouseButton1Click:Connect(function()
        DonDepNộiDung()
        TaoChucNang("Auto Câu Cá / Click")
        TaoChucNang("Auto Bán Cá (Sell)")
        TaoChucNang("Auto Dịch Chuyển Qua Đảo")
        TaoChucNang("Auto Mua Cần")
        TaoChucNang("Auto Mua Mồi")
        TaoChucNang("Auto Lấy Cần Câu")
        TaoChucNang("Auto Làm Nhiệm Vu")
        TaoChucNang("Auto Anti AFK")
        TaoChucNang("Auto Làm Sự Kiện")
        TaoChucNang("Auto Enchanted")
    end)

    -- SỰ KIỆN BẤM VÀO TAB 2 (CHẠY NHANH)
    Tab2.MouseButton1Click:Connect(function()
        DonDepNộiDung()
        
        -- Chức năng tăng tốc độ chạy
        local SpeedBtn = Instance.new("TextButton")
        SpeedBtn.Size = UDim2.new(1, -10, 0, 40)
        SpeedBtn.BackgroundColor3 = Color3.fromRGB(255, 100, 0)
        SpeedBtn.Text = "Bật Chạy Nhanh (Tốc độ 50)"
        SpeedBtn.TextColor3 = Color3.fromRGB(255, 255, 255)
        SpeedBtn.Font = Enum.Font.SourceSansBold
        SpeedBtn.Parent = ContentContainer
        
        SpeedBtn.MouseButton1Click:Connect(function()
            pcall(function() game.Players.LocalPlayer.Character.Humanoid.WalkSpeed = 50 end)
        end)

        TaoChucNang("Đi Trên Mặt Nước")
        TaoChucNang("Nhảy Liên Tục")
    end)

    -- SỰ KIỆN BẤM VÀO TAB 3 (TIKTOK)
    Tab3.MouseButton1Click:Connect(function()
        DonDepNộiDung()
        local TtBtn = Instance.new("TextButton")
        TtBtn.Size = UDim2.new(1, -10, 0, 45)
        TtBtn.BackgroundColor3 = Color3.fromRGB(0, 0, 0)
        TtBtn.Text = "Copy Link TikTok nguyennek_yeah"
        TtBtn.TextColor3 = Color3.fromRGB(0, 255, 255)
        TtBtn.Font = Enum.Font.SourceSansBold
        TtBtn.Parent = ContentContainer

        TtBtn.MouseButton1Click:Connect(function()
            setclipboard("https://www.tiktok.com/@nguyennek_yeah")
            Title.Text = "ĐÃ COPY LINK TIKTOK!"
            task.wait(2)
            Title.Text = "nguyenmenu | by nguyennek_yeah"
        end)
    end)

    -- Mặc định vừa mở khóa thì hiển thị luôn Tab 1
    Tab1:Click()
end

-- XỬ LÝ SỰ KIỆN BẤM KIỂM TRA KEY
CheckBtn.MouseButton1Click:Connect(function()
    if KeyInput.Text == "nguyendz" then
        MoKhoaMenuChinh()
    else
        CheckBtn.Text = "SAI KEY RỒI BẠN ƠI!"
        CheckBtn.BackgroundColor3 = Color3.fromRGB(200, 0, 0)
        task.wait(2)
        CheckBtn.Text = "Kiểm Tra Key"
        CheckBtn.BackgroundColor3 = Color3.fromRGB(0, 170, 100)
    end
end)
