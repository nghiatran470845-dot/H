-- TAB 4: CHỈNH TỐC ĐỘ VÀ NHẢY CAO (Nhảy liên tục)
-- =============================================================================
local NormalSpeed = 16
local NormalJump = 50
local InfiniteJumpEnabled = false

local SpeedSlider = Tabs.TocDo:AddSlider("SpeedSlider", {
    Title = "Tốc Độ Nhân Vật",
    Description = "Chỉnh tốc độ chạy (Mặc định: 16)",
    Default = 16,
    Min = 16,
    Max = 150,
    Rounding = 0,
    Callback = function(Value)
        NormalSpeed = Value
        if LocalPlayer.Character and LocalPlayer.Character:FindFirstChildOfClass("Humanoid") then
            LocalPlayer.Character.Humanoid.WalkSpeed = Value
        end
    end
})

local JumpSlider = Tabs.TocDo:AddSlider("JumpSlider", {
    Title = "Sức Nhảy",
    Description = "Chỉnh độ cao khi nhảy (Mặc định: 50)",
    Default = 50,
    Min = 50,
    Max = 300,
    Rounding = 0,
    Callback = function(Value)
        NormalJump = Value
        if LocalPlayer.Character and LocalPlayer.Character:FindFirstChildOfClass("Humanoid") then
            local Hum = LocalPlayer.Character.Humanoid
            if Hum.UseJumpPower then
                Hum.JumpPower = Value
            else
                Hum.JumpHeight = Value
            end
        end
    end
})

Tabs.TocDo:AddToggle("InfJumpToggle", {
    Title = "Bật Nhảy Liên Tục (Infinite Jump)",
    Default = false,
    Callback = function(Value)
        InfiniteJumpEnabled = Value
    end
})

-- Giữ chỉ số WalkSpeed cố định ngay cả khi hồi sinh
game:GetService("RunService").Heartbeat:Connect(function()
    if LocalPlayer.Character and LocalPlayer.Character:FindFirstChildOfClass("Humanoid") then
        LocalPlayer.Character.Humanoid.WalkSpeed = NormalSpeed
    end
end)

-- Logic Nhảy Liên Tục (Bấm cách trên không vẫn nhảy tiếp được)
game:GetService("UserInputService").JumpRequest:Connect(function()
    if InfiniteJumpEnabled and LocalPlayer.Character and LocalPlayer.Character:FindFirstChildOfClass("Humanoid") then
        LocalPlayer.Character.Humanoid:ChangeState("Jumping")
    end
end)

