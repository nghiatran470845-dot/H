-- [[ CONFIGURATION / CÀI ĐẶT ]]
local Settings = {
    AimbotEnabled = true,
    TeamCheck = true, -- Không ngắm đồng đội
    AimPart = "Head", -- Bộ phận ngắm (Head, HumanoidRootPart)
    Sensitivity = 0.5, -- Độ mượt (Càng nhỏ càng mượt, từ 0 đến 1)
    FOV_Radius = 150, -- Vòng tròn giới hạn ngắm (Pixels)
    FOV_Visible = true
}

-- [[ SERVICES ]]
local Players = game:GetService("Players")
local LocalPlayer = Players.LocalPlayer
local Camera = workspace.CurrentCamera
local RunService = game:GetService("RunService")
local UserInputService = game:GetService("InputService") -- Đôi khi là UserInputService tùy Executor

-- [[ FOV RING (Vòng tròn FOV) ]]
local FOVCircle = Drawing.new("Circle")
FOVCircle.Thickness = 2
FOVCircle.Color = Color3.fromRGB(255, 0, 0)
FOVCircle.Filled = false

-- [[ HÀM TÌM KẺ ĐỊCH GẦN TÂM MÀN HÌNH NHẤT ]]
local function GetClosestPlayer()
    local ClosestTarget = nil
    local MaxDistance = Settings.FOV_Radius

    for _, player in ipairs(Players:GetPlayers()) do
        if player ~= LocalPlayer then
            if not Settings.TeamCheck or player.Team ~= LocalPlayer.Team then
                local Character = player.Character
                if Character and Character:FindFirstChild(Settings.AimPart) and Character:FindFirstChildOfClass("Humanoid") then
                    if Character.Humanoid.Health > 0 then
                        local AimTarget = Character[Settings.AimPart]
                        local ScreenPosition, OnScreen = Camera:WorldToViewportPoint(AimTarget.Position)
                        
                        if OnScreen then
                            local MousePosition = UserInputService:GetMouseLocation()
                            local Distance = (Vector2.new(ScreenPosition.X, ScreenPosition.Y) - MousePosition).Magnitude
                            
                            if Distance < MaxDistance then
                                MaxDistance = Distance
                                ClosestTarget = AimTarget
                            end
                        end
                    end
                end
            end
        end
    end
    return ClosestTarget
end

-- [[ VÒNG LẶP AIMBOT CHÍNH (FIX FIRST-PERSON) ]]
RunService.RenderStepped:Connect(function()
    -- Cập nhật vòng tròn FOV
    if Settings.FOV_Visible then
        local MousePosition = UserInputService:GetMouseLocation()
        FOVCircle.Position = MousePosition
        FOVCircle.Radius = Settings.FOV_Radius
        FOVCircle.Visible = true
    else
        FOVCircle.Visible = false
    end

    -- Thực hiện Ngắm (Aim)
    if Settings.AimbotEnabled then
        local Target = GetClosestPlayer()
        if Target then
            -- Tính toán Vector hướng từ Camera đến Đầu địch
            local TargetPosition = Target.Position
            local CameraPosition = Camera.CFrame.Position
            local NewTargetCFrame = CFrame.new(CameraPosition, TargetPosition)

            -- FIX LỖI FIRST PERSON: Sử dụng CFrame.lookAt kết hợp Lerp để mượt mà
            -- Cách này ép Camera phải xoay bất chấp chế độ góc nhìn (First hay Third Person)
            if (Camera.CFrame.Position - Camera.Focus.Position).Magnitude < 1 then
                -- Trạng thái góc nhìn thứ nhất (First Person)
                Camera.CFrame = Camera.CFrame:Lerp(NewTargetCFrame, Settings.Sensitivity)
            else
                -- Trạng thái góc nhìn thứ ba
                Camera.CFrame = Camera.CFrame:Lerp(NewTargetCFrame, Settings.Sensitivity)
            end
        end
    end
end)