    Default = false,
    Callback = function(Value)
        HitboxEnabled = Value
    end
})

local HitboxSlider = Tabs.Hitbox:AddSlider("HitboxSlider", {
    Title = "Kích Thước Hitbox",
    Description = "Tăng tầm đánh xa (Mặc định là 1, tối đa 40)",
    Default = 1,
    Min = 1,
    Max = 40,
    Rounding = 0,
    Callback = function(Value)
        HitboxSize = Value
    end
})

-- Vòng lặp mở rộng bộ phận HumanoidRootPart của kẻ địch xung quanh
task.spawn(function()
    while task.wait(0.5) do
        if HitboxEnabled then
            for _, Player in pairs(game:GetService("Players"):GetPlayers()) do
                if Player ~= LocalPlayer and Player.Character and Player.Character:FindFirstChild("HumanoidRootPart") then
                    local HRP = Player.Character.HumanoidRootPart
                    HRP.Size = Vector3.new(HitboxSize, HitboxSize, HitboxSize)
                    HRP.Transparency = 0.7 -- Làm mờ hộp hitbox để dễ nhìn thấy
                    HRP.BrickColor = BrickColor.new("Really red")
                    HRP.CanCollide = false
                end
            end
        else
            -- Trả lại kích thước cũ nếu tắt tính năng
            for _, Player in pairs(game:GetService("Players"):GetPlayers()) do
                if Player ~= LocalPlayer and Player.Character and Player.Character:FindFirstChild("HumanoidRootPart") then
                    local HRP = Player.Character.HumanoidRootPart
                    HRP.Size = Vector3.new(2, 2, 1)
                    HRP.Transparency = 1
                    HRP.CanCollide = true
                end
            end
        end
    end
end)


