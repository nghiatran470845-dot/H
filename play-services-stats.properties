-- =============================================================================
-- AIMBOT LOCK HEAD CHUYÊN DỤNG CHO DELTA EXECUTOR
-- =============================================================================

local Players = game:GetService("Players")
local LocalPlayer = Players.LocalPlayer
local Camera = game:GetService("Workspace").CurrentCamera
local RunService = game:GetService("RunService")
local UserInputService = game:GetService("UserInputService")
local CoreGui = game:GetService("CoreGui")

-- Xóa giao diện cũ nếu có để tránh lỗi trùng lặp
if CoreGui:FindFirstChild("DeltaAimbotUI") then
    CoreGui.DeltaAimbotUI:Destroy()
end

-- CẤU HÌNH CƠ BẢN
local AimbotEnabled = false -- Mặc định tắt khi mới chạy script
local TeamCheck = true      -- Bật "true" để KHÔNG bắn đồng đội (Đổi thành "false" nếu muốn khóa vào tất cả mọi người)

-- TẠO NÚT BẬT TẮT TRÊN MÀN HÌNH (MOBILE FRIENDLY)
local ScreenGui = Instance.new("ScreenGui")
ScreenGui.Name = "DeltaAimbotUI"
ScreenGui.Parent = CoreGui
ScreenGui.ResetOnSpawn = false

local ToggleButton = Instance.new("TextButton")
ToggleButton.Name = "AimbotToggle"
ToggleButton.Size = UDim2.new(0, 110, 0, 45)
ToggleButton.Position = UDim2.new(0.1, 0, 0.1, 0) -- Vị trí góc trên bên trái màn hình
ToggleButton.BackgroundColor3 = Color3.fromRGB(200, 50, 50) -- Màu đỏ khi tắt
ToggleButton.Text = "Aimbot: OFF"
ToggleButton.TextColor3 = Color3.fromRGB(255, 255, 255)
ToggleButton.Font = Enum.Font.SourceSansBold
ToggleButton.TextSize = 16
ToggleButton.Active = true
ToggleButton.Draggable = true -- Bạn có thể dùng ngón tay kéo nút này đi bất kỳ đâu trên màn hình
ToggleButton.Parent = ScreenGui

local Corner = Instance.new("UICorner")
Corner.CornerRadius = UDim.new(0, 8)
Corner.Parent = ToggleButton

-- Tạo viền đẹp cho nút
local UIStroke = Instance.new("UIStroke")
UIStroke.Color = Color3.fromRGB(255, 255, 255)
UIStroke.Thickness = 1.5
UIStroke.Parent = ToggleButton

-- Sự kiện click để bật/tắt
ToggleButton.MouseButton1Click:Connect(function()
    AimbotEnabled = not AimbotEnabled
    if AimbotEnabled then
        ToggleButton.Text = "Aimbot: ON"
        ToggleButton.BackgroundColor3 = Color3.fromRGB(50, 180, 80) -- Màu xanh khi bật
    else
        ToggleButton.Text = "Aimbot: OFF"
        ToggleButton.BackgroundColor3 = Color3.fromRGB(200, 50, 50) -- Màu đỏ khi tắt
    end
end)

-- HÀM TÌM NGƯỜI CHƠI GẦN TÂM MÀN HÌNH NHẤT
local function GetClosestPlayer()
    local ClosestPlayer = nil
    local ShortestDistance = math.huge
    local MousePos = UserInputService:GetMouseLocation()

    for _, Player in pairs(Players:GetPlayers()) do
        if Player ~= LocalPlayer and Player.Character then
            -- Kiểm tra Team nếu bật TeamCheck
            if not TeamCheck or (Player.Team ~= LocalPlayer.Team) then
                local Head = Player.Character:FindFirstChild("Head")
                local Humanoid = Player.Character:FindFirstChildOfClass("Humanoid")
                
                -- Điều kiện: Nhân vật phải còn sống và có bộ phận Đầu (Head)
                if Head and Humanoid and Humanoid.Health > 0 then
                    local ScreenPos, OnScreen = Camera:WorldToViewportPoint(Head.Position)
                    
                    -- Mục tiêu phải nằm trong tầm nhìn của Camera
                    if OnScreen then
                        local Distance = (Vector2.new(ScreenPos.X, ScreenPos.Y) - MousePos).Magnitude
                        if Distance < ShortestDistance then
                            ClosestPlayer = Player
                            ShortestDistance = Distance
                        end
                    end
                end
            end
        end
    end
    return ClosestPlayer
end

-- VÒNG LẶP KHÓA TÂM LIÊN TỤC (RENDERSTEPPED GIÚP MƯỢT MÀ KHÔNG GIẬT LAG)
RunService.RenderStepped:Connect(function()
    if AimbotEnabled then
        local Target = GetClosestPlayer()
        if Target and Target.Character and Target.Character:FindFirstChild("Head") then
            -- Khóa góc nhìn của Camera thẳng vào Đầu của mục tiêu
            Camera.CFrame = CFrame.new(Camera.CFrame.Position, Target.Character.Head.Position)
        end
    end
end)

-- Thông báo cho người dùng
print("Delta Aimbot đã kích hoạt thành công!")
